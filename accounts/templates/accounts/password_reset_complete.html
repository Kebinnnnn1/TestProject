{% extends 'accounts/base.html' %}
{% block title %}Password Reset Complete — Clink{% endblock %}

{% block extra_head %}
<style>
    .auth-wrap {
        min-height: 90vh;
        display: flex; align-items: center; justify-content: center;
        padding: 3rem 1rem;
        background: var(--surface-2);
        position: relative; overflow: hidden;
    }
    .auth-blob-1 {
        position: absolute; width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(78,124,63,0.12), transparent 70%);
        top: -150px; right: -100px; border-radius: 50%;
        animation: blobPulse 8s ease-in-out infinite; pointer-events: none;
    }
    .auth-blob-2 {
        position: absolute; width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(139,191,124,0.12), transparent 70%);
        bottom: -100px; left: -80px; border-radius: 50%;
        animation: blobPulse 10s 3s ease-in-out infinite; pointer-events: none;
    }
    .auth-card {
        width: 100%; max-width: 430px;
        background: var(--card-bg); border-radius: 24px;
        box-shadow: 0 24px 64px rgba(40,70,30,0.10);
        padding: 3rem; border: 1px solid var(--border);
        position: relative; z-index: 1;
        animation: fadeInUp 0.7s ease both; text-align: center;
    }
    .success-icon {
        width: 72px; height: 72px;
        background: linear-gradient(135deg, rgba(78,124,63,0.15), rgba(139,191,124,0.10));
        border: 2px solid rgba(78,124,63,0.25);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; color: var(--blue);
        margin: 0 auto 1.5rem;
    }
    [data-theme="dark"] .auth-blob-1 { background: radial-gradient(circle, rgba(78,124,63,0.28), transparent 70%); }
    [data-theme="dark"] .auth-blob-2 { background: radial-gradient(circle, rgba(139,191,124,0.28), transparent 70%); }
    @media (max-width: 480px) { .auth-card { padding: 2rem 1.5rem; } }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-blob-1"></div>
    <div class="auth-blob-2"></div>

    <div class="auth-card">
        <div class="success-icon"><i class="bi bi-check-circle-fill"></i></div>
        <h1 style="font-size:1.6rem;font-weight:800;letter-spacing:-0.5px;color:var(--text-dark);margin-bottom:0.5rem;">Password updated!</h1>
        <p style="color:var(--text-light);font-size:0.92rem;line-height:1.65;margin-bottom:2rem;">
            Your password has been set successfully. You can now sign in with your new password.
        </p>
        <a href="{% url 'login' %}" class="btn-primary-grad" style="justify-content:center;width:100%;text-decoration:none;">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </a>
    </div>
</div>
{% endblock %}
