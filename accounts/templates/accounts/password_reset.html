{% extends 'accounts/base.html' %}
{% block title %}Reset Password — Clink{% endblock %}

{% block extra_head %}
<style>
    .auth-wrap {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 3rem 1rem;
        background: var(--surface-2);
        position: relative;
        overflow: hidden;
    }
    .auth-blob-1 {
        position: absolute;
        width: 500px; height: 500px;
        background: radial-gradient(circle, rgba(78,124,63,0.12), transparent 70%);
        top: -150px; right: -100px;
        border-radius: 50%;
        animation: blobPulse 8s ease-in-out infinite;
        pointer-events: none;
    }
    .auth-blob-2 {
        position: absolute;
        width: 400px; height: 400px;
        background: radial-gradient(circle, rgba(139,191,124,0.12), transparent 70%);
        bottom: -100px; left: -80px;
        border-radius: 50%;
        animation: blobPulse 10s 3s ease-in-out infinite;
        pointer-events: none;
    }
    .auth-card {
        width: 100%; max-width: 430px;
        background: var(--card-bg);
        border-radius: 24px;
        box-shadow: 0 24px 64px rgba(40,70,30,0.10);
        padding: 3rem;
        border: 1px solid var(--border);
        position: relative; z-index: 1;
        animation: fadeInUp 0.7s ease both;
    }
    .auth-logo {
        width: 52px; height: 52px;
        background: var(--grad-main);
        border-radius: 14px;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.4rem; color: #fff;
        margin-bottom: 1.5rem;
    }
    /* Style Django-generated inputs */
    .auth-card input {
        width: 100%;
        background: var(--input-bg);
        border: 1.5px solid var(--input-border);
        color: var(--text-dark);
        border-radius: 10px;
        padding: 0.75rem 1rem;
        font-size: 0.92rem;
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
        box-sizing: border-box;
    }
    .auth-card input:focus {
        outline: none;
        border-color: var(--blue);
        box-shadow: 0 0 0 3px rgba(78, 124, 63, 0.12);
        background: var(--surface);
    }
    .auth-card input::placeholder { color: var(--text-light); }
    [data-theme="dark"] .auth-blob-1 { background: radial-gradient(circle, rgba(78,124,63,0.28), transparent 70%); }
    [data-theme="dark"] .auth-blob-2 { background: radial-gradient(circle, rgba(139,191,124,0.28), transparent 70%); }
    @media (max-width: 480px) { .auth-card { padding: 2rem 1.5rem; } }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-blob-1"></div>
    <div class="auth-blob-2"></div>

    <div class="auth-card">
        <div class="auth-logo"><i class="bi bi-key-fill"></i></div>
        <h1 style="font-size:1.7rem;font-weight:800;letter-spacing:-0.5px;color:var(--text-dark);margin-bottom:0.3rem;">Forgot password?</h1>
        <p style="color:var(--text-light);font-size:0.9rem;margin-bottom:2rem;">
            Enter your email and we'll send you a reset link.
        </p>

        <form method="post" novalidate>
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label"><i class="bi bi-envelope me-1"></i>Email address</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn-primary-grad w-100" style="justify-content:center;">
                <i class="bi bi-send-fill"></i> Send Reset Link
            </button>
        </form>

        <div style="text-align:center;margin-top:1.5rem;">
            <a href="{% url 'login' %}" style="font-size:0.83rem;color:var(--text-light);text-decoration:none;">
                <i class="bi bi-arrow-left"></i> Back to <span style="color:var(--blue);font-weight:600;">Sign In</span>
            </a>
        </div>
    </div>
</div>
{% endblock %}
