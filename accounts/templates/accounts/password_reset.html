{% extends 'accounts/base.html' %}
{% block title %}Reset Password — CUlink{% endblock %}

{% block extra_head %}
<style>
  .auth-wrap {
    min-height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    background: var(--bg);
  }

  .auth-card {
    width: 100%; max-width: 430px;
    background: var(--bg-white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    padding: 3rem;
    border: 1px solid var(--border);
    animation: fadeInUp 0.5s ease both;
  }

  .auth-logo {
    width: 48px; height: 48px;
    background: var(--pink);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem; color: #fff;
    margin-bottom: 1.5rem;
  }

  .auth-card input {
    width: 100%;
    background: var(--bg-white);
    border: 1.5px solid var(--border);
    color: var(--text-dark);
    border-radius: var(--radius-sm);
    padding: 0.75rem 1rem;
    font-size: 0.92rem;
    font-family: 'Space Grotesk', sans-serif;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-sizing: border-box;
  }

  .auth-card input:focus {
    outline: none;
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(255,63,164,0.12);
  }

  @media (max-width: 480px) { .auth-card { padding: 2rem 1.5rem; } }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-key-fill"></i></div>
    <h1 style="font-size:1.7rem;font-weight:700;letter-spacing:-0.5px;color:var(--text-dark);margin-bottom:0.3rem;">Forgot password?</h1>
    <p style="color:var(--text-light);font-size:0.9rem;margin-bottom:2rem;">
      Enter your email and we'll send you a reset link.
    </p>

    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label"><i class="bi bi-envelope me-1"></i>Email address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn-primary-grad w-100" style="justify-content:center; font-size:1rem; padding:0.9rem;">
        <i class="bi bi-send-fill"></i> Send Reset Link
      </button>
    </form>

    <div style="text-align:center;margin-top:1.5rem;">
      <a href="{% url 'login' %}" style="font-size:0.83rem;color:var(--text-light);text-decoration:none;">
        <i class="bi bi-arrow-left"></i> Back to <span style="color:var(--pink);font-weight:600;">Sign In</span>
      </a>
    </div>
  </div>
</div>
{% endblock %}
